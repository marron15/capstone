<!DOCTYPE html>

  <script>
    // Run first: Safari/WebKit may log WebGL CanvasKit noise before <body> scripts run.
    (function() {
      function joinArgs(args) {
        return Array.prototype.map.call(args, function (a) {
          try {
            return String(a);
          } catch (e) {
            return '';
          }
        }).join(' ');
      }
      function suppressBrowserNoise(message) {
        if (!message) return false;
        if (message.includes('Noto fonts') || message.includes('missing characters')) return true;
        if (message.includes('WEBGL_polygon_mode')) return true;
        if (message.includes('non-portable extension enabled')) return true;
        if (message.includes('WebGL: non-portable')) return true;
        if (message.includes('Injecting <script> tag')) return true;
        return false;
      }
      const originalWarn = console.warn;
      console.warn = function () {
        const message = joinArgs(arguments);
        if (suppressBrowserNoise(message)) return;
        originalWarn.apply(console, arguments);
      };
      const originalLog = console.log;
      console.log = function () {
        const message = joinArgs(arguments);
        if (suppressBrowserNoise(message)) return;
        originalLog.apply(console, arguments);
      };
      const originalInfo = console.info;
      console.info = function () {
        const message = joinArgs(arguments);
        if (suppressBrowserNoise(message)) return;
        originalInfo.apply(console, arguments);
      };
      const originalDebug = console.debug;
      console.debug = function () {
        const message = joinArgs(arguments);
        if (suppressBrowserNoise(message)) return;
        originalDebug.apply(console, arguments);
      };
      const originalError = console.error;
      console.error = function () {
        const message = joinArgs(arguments);
        if (suppressBrowserNoise(message)) return;
        originalError.apply(console, arguments);
      };
    })();
  </script>

  <!-- Capture beforeinstallprompt as early as possible (before Flutter loads). -->
  <script>
    window.__deferredPwaPrompt = null;
    window.addEventListener(
      'beforeinstallprompt',
      function (e) {
        e.preventDefault();
        window.__deferredPwaPrompt = e;
        window.dispatchEvent(new CustomEvent('pwa-installable', { detail: true }));
      },
      { capture: true },
    );
  </script>

  <script>
    (function () {
      const shouldLogIntlFix =
        ['localhost', '127.0.0.1', ''].includes(window.location.hostname);
      if (!window.Intl) return;
      const descriptor = Object.getOwnPropertyDescriptor(Intl, 'v8BreakIterator');
      if (!descriptor) return;
      try {
        if (descriptor.writable) {
          Intl.v8BreakIterator = undefined;
        } else if (descriptor.configurable) {
          Object.defineProperty(Intl, 'v8BreakIterator', {
            value: undefined,
            configurable: true,
            writable: true,
          });
        }
      } catch (err) {
        if (shouldLogIntlFix) {
          console.warn('Unable to redefine Intl.v8BreakIterator:', err);
        }
      }
    }());
  </script>
  <!-- PWA Install Prompt Handler -->
  <script>
    window.isPwaStandalone = function () { return false; };
    window.isPwaInstalled = function () { return false; };
    window.isPwaInstallAvailable = function () { return false; };
    window.getPwaInstallReason = function () { return 'loading'; };
    window.triggerPwaInstallPromptSync = function () { return false; };
    window.getPwaInstallOutcome = async function () { return 'unavailable'; };
    window.triggerPwaInstall = async function () { return false; };

    let isStandalone = false;
    let installedDetected = false;
    let manifestLoaded = false;
    let swRegistered = false;
    const INSTALLED_FLAG = 'rnrPwaInstalled';

    try {
      installedDetected = window.localStorage.getItem(INSTALLED_FLAG) === '1';
    } catch (e) {
      installedDetected = false;
    }

    function markInstalled() {
      installedDetected = true;
      try {
        window.localStorage.setItem(INSTALLED_FLAG, '1');
      } catch (e) {
        /* ignore storage errors */
      }
      window.dispatchEvent(new CustomEvent('pwa-installed', { detail: true }));
    }

    function markUninstalled() {
      installedDetected = false;
      try {
        window.localStorage.removeItem(INSTALLED_FLAG);
      } catch (e) {
        /* ignore storage errors */
      }
      window.dispatchEvent(new CustomEvent('pwa-check-availability', { detail: true }));
    }
    const shouldLogPwa =
      ['localhost', '127.0.0.1', ''].includes(window.location.hostname);
    const pwaLog = (...args) => {
      if (shouldLogPwa) console.log(...args);
    };
    const pwaWarn = (...args) => {
      if (shouldLogPwa) console.warn(...args);
    };

    function getDeferredPrompt() {
      return window.__deferredPwaPrompt || null;
    }

    function clearDeferredPrompt() {
      window.__deferredPwaPrompt = null;
    }

    function isIosSafari() {
      const ua = navigator.userAgent || '';
      return /iPhone|iPad|iPod/.test(ua) && !window.MSStream;
    }

    function isChromiumBrowser() {
      const ua = navigator.userAgent || '';
      return /Chrome|CriOS|Chromium|Edg|OPR|SamsungBrowser/.test(ua);
    }

    if (window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone === true ||
        document.referrer.includes('android-app://')) {
      isStandalone = true;
      installedDetected = true;
      pwaLog('PWA: App is running in standalone mode');
    }

    // Detect an already-installed PWA even when viewing in a normal browser tab.
    if (navigator.getInstalledRelatedApps) {
      navigator.getInstalledRelatedApps().then((apps) => {
        if (apps && apps.length > 0) {
          pwaLog('PWA: Detected installed related app(s):', apps.length);
          markInstalled();
        } else if (!isStandalone) {
          // Browser no longer reports it as installed; clear a stale flag.
          markUninstalled();
        }
      }).catch(() => {
        /* getInstalledRelatedApps unsupported or blocked; rely on other signals. */
      });
    }

    const manifestPaths = [
      'manifest.json',
      './manifest.json',
      new URL('manifest.json', document.baseURI).href,
    ];

    let manifestCheckAttempts = 0;
    const checkManifest = (path) => {
      fetch(path)
        .then((response) => {
          if (response.ok) {
            manifestLoaded = true;
            pwaLog('PWA: Manifest loaded successfully from', path);
            window.dispatchEvent(new CustomEvent('pwa-manifest-ready', { detail: true }));
          } else if (manifestCheckAttempts < manifestPaths.length - 1) {
            manifestCheckAttempts++;
            checkManifest(manifestPaths[manifestCheckAttempts]);
          }
        })
        .catch(() => {
          if (manifestCheckAttempts < manifestPaths.length - 1) {
            manifestCheckAttempts++;
            checkManifest(manifestPaths[manifestCheckAttempts]);
          }
        });
    };

    checkManifest(manifestPaths[0]);

    window.isPwaStandalone = function () {
      return isStandalone;
    };

    window.isPwaInstalled = function () {
      return isStandalone || installedDetected;
    };

    window.isPwaInstallAvailable = function () {
      if (isStandalone || installedDetected || !window.isSecureContext) return false;
      if (getDeferredPrompt()) return true;
      if (isIosSafari()) return true;
      return manifestLoaded && isChromiumBrowser();
    };

    // Returns a reason code explaining the current install state. Used to show
    // a precise message when the native prompt is not available.
    window.getPwaInstallReason = function () {
      if (isStandalone || installedDetected) return 'installed';
      if (!window.isSecureContext) return 'insecure';
      if (getDeferredPrompt()) return 'ready';
      if (isIosSafari()) return 'ios';
      if (!manifestLoaded) return 'no-manifest';
      if (!swRegistered) return 'no-sw';
      if (!isChromiumBrowser()) return 'unsupported-browser';
      // Chromium + manifest + SW but no deferred prompt: usually already
      // installed on this device/profile, or the prompt was already used.
      return 'already-installed-or-used';
    };

    // Must run synchronously inside the user's click handler (before any await).
    window.triggerPwaInstallPromptSync = function () {
      if (isStandalone) return false;

      const promptEvent = getDeferredPrompt();
      if (!promptEvent) return false;

      try {
        promptEvent.prompt();
        return true;
      } catch (error) {
        pwaWarn('PWA: prompt() failed:', error);
        clearDeferredPrompt();
        return false;
      }
    };

    window.getPwaInstallOutcome = async function () {
      const promptEvent = getDeferredPrompt();
      if (!promptEvent) return 'unavailable';

      try {
        const { outcome } = await promptEvent.userChoice;
        pwaLog('PWA: User response:', outcome);
        clearDeferredPrompt();
        window.dispatchEvent(new CustomEvent('pwa-install-result', { detail: outcome }));
        return outcome;
      } catch (error) {
        pwaWarn('PWA: userChoice failed:', error);
        clearDeferredPrompt();
        return 'dismissed';
      }
    };

    window.triggerPwaInstall = async function () {
      const started = window.triggerPwaInstallPromptSync();
      if (!started) return false;
      const outcome = await window.getPwaInstallOutcome();
      return outcome === 'accepted';
    };

    window.addEventListener('appinstalled', () => {
      pwaLog('PWA: App installed');
      clearDeferredPrompt();
      markInstalled();
    });

    setInterval(() => {
      if (!isStandalone && getDeferredPrompt()) {
        window.dispatchEvent(new CustomEvent('pwa-check-availability', { detail: true }));
      }
    }, 3000);

    const registerServiceWorker = () => {
      const swUrl = new URL('sw.js', document.baseURI).href;
      navigator.serviceWorker.register(swUrl).then(() => {
        swRegistered = true;
        pwaLog('PWA: Service worker registered at', swUrl);
        window.dispatchEvent(new CustomEvent('pwa-check-availability', { detail: true }));
      }).catch((error) => {
        pwaWarn('PWA: Service worker registration failed:', error);
      });
    };

    if ('serviceWorker' in navigator) {
      if (document.readyState === 'complete') {
        registerServiceWorker();
      } else {
        window.addEventListener('load', registerServiceWorker);
      }
    }
  </script>
